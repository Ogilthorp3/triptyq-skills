# Triptyq Capital — partner directory
# ---------------------------------------------------------------------------
# Maps each partner to the Google account where their portcos share board
# materials. Used by skills that fetch from Google Drive (tearsheet-generator,
# triptyq-investment-memo, vc-due-diligence, portfolio-monitoring).
#
# When a skill needs Drive content for a portco, it:
#   1. Identifies the responsible partner (asks user, or looks up in a
#      future partner_portfolio.yaml mapping if we build one).
#   2. Reads the partner's `google_account` from this file.
#   3. Confirms Drive MCP is authenticated as that account before fetching.
#      Drive MCP currently has no "whoami" tool, so confirmation is by
#      explicit user prompt rather than programmatic check.
#
# Update path: triptyq-skills/_shared/partners.yaml
# ---------------------------------------------------------------------------

